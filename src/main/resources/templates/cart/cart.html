<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
</head>
<body>
<div layout:fragment="content">
    <h2>Giỏ hàng của bạn</h2>

    <div th:if="${cartItems == null or #lists.isEmpty(cartItems)}">
        <p class="text-muted">Giỏ hàng trống.</p>
        <a th:href="@{/products}" class="btn btn-primary">Tiếp tục mua hàng</a>
    </div>

    <div th:if="${cartItems != null and !#lists.isEmpty(cartItems)}">
        <form th:action="@{/cart/checkout}" method="post" id="checkoutForm">
            <table class="table table-striped">
                <thead>
                <tr>
                    <th><input type="checkbox" id="selectAll" checked></th>
                    <th>Hình ảnh</th>
                    <th>Tên sản phẩm</th>
                    <th>Giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td>
                        <input type="checkbox" name="selectedItems" th:value="${item.productId}"
                               class="item-checkbox" checked>
                    </td>
                    <td>
                        <img height="80" width="100" th:src="@{'/images/' + ${item.image}}" alt="Product Image">
                    </td>
                    <td th:text="${item.productName}"></td>
                    <td th:text="${item.price}"></td>
                    <td>
                        <form th:action="@{/cart/update}" method="post" style="display:inline;">
                            <input type="hidden" name="productId" th:value="${item.productId}">
                            <input type="number" name="quantity" th:value="${item.quantity}" min="1" style="width:70px;"
                                   class="form-control-sm">
                            <button type="submit" class="btn btn-sm btn-primary">Cập nhật</button>
                        </form>
                    </td>
                    <td th:text="${item.subtotal}"></td>
                    <td>
                        <a th:href="@{/cart/remove/{id}(id=${item.productId})}" class="btn btn-danger btn-sm">Xóa</a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="text-end">
                <h4>Tổng tiền: <span id="totalAmount" th:text="${totalAmount}"></span></h4>
            </div>

            <div class="mt-3">
                <a th:href="@{/products}" class="btn btn-secondary">Tiếp tục mua hàng</a>
                <button type="submit" class="btn btn-success">Đặt hàng các sản phẩm đã chọn</button>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        // Select all checkbox
        document.getElementById('selectAll')?.addEventListener('change', function() {
            var checkboxes = document.querySelectorAll('.item-checkbox');
            checkboxes.forEach(function(cb) { cb.checked = this.checked; }.bind(this));
            updateTotal();
        });

        // Individual checkbox change
        document.querySelectorAll('.item-checkbox').forEach(function(cb) {
            cb.addEventListener('change', function() {
                updateTotal();
                var allChecked = document.querySelectorAll('.item-checkbox').length ===
                                 document.querySelectorAll('.item-checkbox:checked').length;
                document.getElementById('selectAll').checked = allChecked;
            });
        });

        function updateTotal() {
            var total = 0;
            document.querySelectorAll('.item-checkbox:checked').forEach(function(cb) {
                var row = cb.closest('tr');
                var subtotal = parseInt(row.querySelector('td:nth-child(6)').textContent);
                total += subtotal;
            });
            document.getElementById('totalAmount').textContent = total;
        }
    </script>
</div>
</body>
</html>
